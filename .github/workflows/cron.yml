name: Scraper Cron

on:
  schedule:
    - cron: "0 12 * * *" # 07:00 hora Peru (UTC-5)
    - cron: "0 15 * * *" # 10:00 hora Peru (UTC-5)
    - cron: "0 23 * * *" # 18:00 hora Peru (UTC-5)
  workflow_dispatch: # ejecución manual

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm start
        env:
          SCRAPER_SUPABASE_URL: ${{ secrets.SCRAPER_SUPABASE_URL }}
          SCRAPER_SUPABASE_KEY: ${{ secrets.SCRAPER_SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_AI_ENABLED: true
          OPENAI_MODEL: gpt-4.1-mini
          OPENAI_MAX_RETRIES: 1
          OPENAI_RETRY_BASE_MS: 500
          SCRAPER_REQUEST_TIMEOUT_MS: 15000
          NEWS_MAX_PER_FEED: 10
          NEWS_MAX_AGE_DAYS: 2